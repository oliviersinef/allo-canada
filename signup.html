<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription 🍁 Allo Canada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8faff 0%, #eef2ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .auth-logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 32px;
            display: block;
            text-decoration: none;
        }

        .auth-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--neutral-800);
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--neutral-500);
            margin-bottom: 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--neutral-700);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--neutral-300);
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .btn-auth {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-auth:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .auth-footer {
            margin-top: 24px;
            font-size: 14px;
            color: var(--neutral-500);
        }

        .auth-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--neutral-400);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        #auth-error {
            color: #EF4444;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        #auth-success {
            color: #10B981;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <a href="index.html" class="auth-logo">Allo Canada 🍁</a>
        <h1 class="auth-title">Prêt à partir ?</h1>
        <p class="auth-subtitle">Créez votre compte pour sauvegarder vos discussions.</p>

        <div id="auth-error">Une erreur est survenue lors de l'inscription.</div>
        <div id="auth-success">Compte créé ! Redirection...</div>

        <form id="signup-form">
            <div class="form-group">
                <label class="form-label" for="full-name">Nom complet</label>
                <input type="text" id="full-name" class="form-input" placeholder="Jean Dupont" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Adresse email</label>
                <input type="email" id="email" class="form-input" placeholder="nom@exemple.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="country">Pays</label>
                <input type="text" id="country" class="form-input" placeholder="Ex: Cameroun, France..." required>
            </div>
            <div class="form-group">
                <label class="form-label" for="phone">Numéro de téléphone</label>
                <input type="tel" id="phone" class="form-input" placeholder="+237 600000000" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Mot de passe</label>
                <div class="password-wrapper">
                    <input type="password" id="password" class="form-input" placeholder="•••••••• (min 6 caractères)" minlength="6" required style="padding-right: 45px;">
                    <button type="button" class="password-toggle" id="toggle-password" aria-label="Afficher le mot de passe">
                        <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-auth">S'inscrire</button>
        </form>

        <div class="auth-footer">
            Vous avez déjà un compte ? <a href="login.html" class="auth-link">Connectez-vous</a>
        </div>
    </div>

    <!-- Script Supabase logic will be added via auth.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('full-name').value;
            const email = document.getElementById('email').value;
            const country = document.getElementById('country').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            try {
                // handleSignUp takes exactly: rawEmail, rawPassword, rawFullName, rawCountry, rawPhone
                const { success, error } = await handleSignUp(email, password, fullName, country, phone);
                if (success) {
                    document.getElementById('auth-success').style.display = 'block';
                    document.getElementById('auth-error').style.display = 'none';
                    setTimeout(() => window.location.href = 'chat.html', 1500);
                } else {
                    const errDiv = document.getElementById('auth-error');
                    errDiv.textContent = error.message;
                    errDiv.style.display = 'block';
                }
            } catch (err) {
                console.error("Critical Signup Error:", err);
                alert("Erreur technique d'inscription : " + err.message);
            }
        });

        // Toggle Password Visibility
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
                this.setAttribute('aria-label', 'Masquer le mot de passe');
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
                this.setAttribute('aria-label', 'Afficher le mot de passe');
            }
        });
    </script>
</body>
</html>
